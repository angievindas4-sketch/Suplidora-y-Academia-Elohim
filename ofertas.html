<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertas - Suplidora Elohim</title>
    <link rel="stylesheet" href="css/style-ofertas.css">
</head>
<body>

<!-- Header -->
<header>
    <h1>Ofertas Especiales - Suplidora Elohim</h1>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="academia.html">Academia</a>
        <a href="suplidora.html">Suplidora</a>
    </nav>
</header>

<!-- Título de la sección -->
<div class="titulo-catalogo-container">
    <h2 class="bienvenida">Ofertas del Mes</h2>
</div>

<!-- Panel de productos -->
<div class="panel show">
    <div class="productos-grid">

        <!-- Producto 1 -->
        <div class="producto">
            <img src="img/OFERTAS/TINA + KIT PEQUEÑO 10 MIL.jpeg" alt="Tina con Kit Pedicura" onclick="abrirModal(this.src)">
            <p class="nombre-producto-texto">Tina con Kit Pedicura</p>
            <p class="precio-producto">₡10,000 <span class="precio-original">₡15,000</span></p>
            <button class="agregar-btn" onclick="agregarAlCarrito('Tina con Kit Pedicura', 10000)">Agregar a lista</button>
        </div>
        <div class="producto">
            <img src="img/OFERTAS/DRILL 10 MIL.jpeg" alt="Drill 35 mil RPM" onclick="abrirModal(this.src)">
            <p class="nombre-producto-texto">Drill 35 mil RPM</p>
            <p class="precio-producto">₡10,000 <span class="precio-original">₡18,000</span></p>
            <button class="agregar-btn" onclick="agregarAlCarrito('Drill 35 mil RPM', 10000)">Agregar a lista</button>
        </div>
        <div class="producto">
            <img src="img/OFERTAS/DUO PERFECT 3 MIL.jpeg" alt="Duo Perfecto" onclick="abrirModal(this.src)">
            <p class="nombre-producto-texto">Duo Perfecto</p>
            <p class="precio-producto">₡3,000 <span class="precio-original">₡6,000</span></p>
            <button class="agregar-btn" onclick="agregarAlCarrito('Duo Perfecto', 3000)">Agregar a lista</button>
        </div>
    </div>
</div>


<!-- Modal de imagen -->
<div id="modalImagen">
    <img id="img-modal" src="" alt="Producto">
</div>

 <!-- ===== Carrito flotante (pegar antes del </body>) ===== -->
<div class="carrito-flotante" id="carritoFlotante">
  <button id="btnCarrito" class="btn-carrito" aria-label="Abrir carrito">🛒</button>

  <div class="panel-carrito" id="panelCarrito" role="dialog" aria-hidden="true">
    <div class="carrito-header">
      <h3>Tu lista</h3>
      <button id="cerrarCarrito" class="cerrar">✕</button>
    </div>

    <div class="carrito-body">
      <ul id="listaCarrito" class="lista-carrito"></ul>

     <div class="carrito-total">
  <label for="clienteNombre">Nombre (opcional)</label>
  <input id="clienteNombre" type="text" placeholder="Tu nombre" />

  <label for="descripcionPedido">Descripción / Observaciones</label>
  <textarea 
    id="descripcionPedido" 
    placeholder="Escribe aquí alguna observación sobre tu pedido..."
    rows="3">
  </textarea>

  <p id="totalCarrito">Total: ₡0</p>

  <div class="carrito-actions">
    <button id="vaciarCarrito" class="btn-accion">Vaciar</button>
    <button id="enviarWhatsApp" class="btn-accion btn-enviar">
      Enviar por WhatsApp
    </button>
  </div>
</div>
      </div>
    </div>
  </div>
</div>

<!-- Toast notificaciones -->
<div id="toastCarrito" class="toast" aria-live="polite"></div>

<!-- Footer -->
<footer>
  <p id="footer-text">By Freelancer Anyelith Nuñez Vindas &copy; <span id="anio"></span></p> 
</footer>

<!-- Scripts -->
<script>
    document.getElementById("anio").textContent = new Date().getFullYear();
</script>
<script src="js/script-suplidora.js"></script>

</body>
</html>
